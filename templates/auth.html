<!DOCTYPE html>
<html>
<head>
    <title>SecureIQ</title>
    <meta charset="UTF-8">
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#e6e9f0,#eef1f5);
        }

        .wrapper{
            width:1000px;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            color:#333;
            font-weight:600;
        }

        .box{
            position:relative;
            display:flex;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 20px 40px rgba(0,0,0,0.15);
        }

        .left, .right{
            width:50%;
            padding:60px 50px;
            z-index:2;
        }

        .left{
            background:white;
            text-align:left;
        }

        .right{
            background: linear-gradient(135deg,#7b2ff7,#4e0eff);
            color:white;
            text-align:left;
        }

        h2{
            font-size:28px;
            margin-bottom:25px;
        }

        /* INPUT STYLE */
        input{
            width:100%;
            padding:14px 20px;
            margin:15px 0;
            border:none;
            border-radius:30px;
            font-size:14px;
            outline:none;
        }

        .left input{
            background:#f2f2f2;
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.1);
        }

        .right input{
            background:white;
            color:#333;
        }

        .right input::placeholder{
            color:#666;
        }

        /* BUTTON STYLE */
        button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
        }

        .left button{
            background: linear-gradient(90deg,#2f50f7,#5244d3);
            color:white;
        }

        .right button{
            background:white;
            color:#2f50f7;
            font-weight:bold;
        }

        /* SVG CURVE */
        .curve{
            position:absolute;
            left:50%;
            top:0;
            transform:translateX(-50%);
            height:100%;
            z-index:1;
        }

    </style>
</head>

<body>

<div class="wrapper">
    <h1>Welcome to SecureIQ </h1>

    <div class="box">

        <!-- Smooth Center Curve -->
        <svg class="curve" width="200" viewBox="0 0 200 600" preserveAspectRatio="none">
            <path d="M100,0 
                     C160,150 160,450 100,600 
                     L0,600 L0,0 Z" 
                  fill="white"/>
        </svg>

        <!-- LEFT -->
        <div class="left">
    <h2>Create Account</h2>

    <form action="/signup" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>

        <!-- ✅ MOVE MESSAGE HERE -->
        {% if msg %}
        <p style="color: green; font-weight: bold; margin-top: 10px;">
             {{ msg }}
        </p>
        {% endif %}

    </form>
</div>

        <!-- RIGHT -->
        <div class="right">
            <h2>Login</h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

    </div>
</div>



{% if error %}
<script>
    alert("{{ error }}");
</script>
{% endif %}


</body>
</html>
