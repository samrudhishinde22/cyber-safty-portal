<!DOCTYPE html>
<html>
<head>
    <title>SecureIQ</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f6ff;
        }

        /* Top Title */
        .header {
            background: #4587e9;
            color: white;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
        }

        /* LEFT SIDE MENU */
        .menu {
            position: absolute;
            left: 20px;
            top: 70px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu a {
            text-decoration: none;
            font-size: 16px;
            color: #0b5ed7;
            background: white;
            padding: 8px 15px;
            border-radius: 6px;
            width: 150px;
            text-align: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* CENTERED MAIN HEADING */
        .content {
            margin-left: 220px;
            margin-top: 150px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #0b5ed7;
        }
    </style>
</head>
<body>

    <div class="header">
        SecureIQ
    </div>

    <!-- LEFT SIDE VERTICAL MENU -->
    <div class="menu">
        <a href="/auth">Signup & login</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/quiz">Quiz</a>
        <a href="/certificate">Certificate</a>
        <a href="/password_strength">Password Strength</a>
    </div>

    <!-- MAIN HEADING CENTERED -->
    <div class="content">
        Welcome to SecureIQ
    </div>

</body>
</html>
