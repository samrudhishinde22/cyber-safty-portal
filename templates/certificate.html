{% extends "base.html" %}

{% block content %}

<style>

    body{
        background:
        linear-gradient(rgba(255,255,255,0.70), rgba(255,255,255,0.70)),
        url('/static/bg3.png');
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
        background-attachment:fixed;
    }

    .page-center{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height: calc(100vh - 120px);
    }


    /* DO NOT TOUCH BODY (base.html handles layout) */

    /* CONTENT AREA FIX */
    .content {
        margin-left: 240px;
        padding: 100px 40px 40px;
    }

    /* CENTER CONTAINER */
    .certificate-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    /* CERTIFICATE DESIGN */
    .certificate {
        background: white;
        width: 760px;
        padding: 50px 40px;
        border: 4px double #1f3bb3;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    .portal-name {
        font-size: 22px;
        font-weight: 800;
        color: #1f3bb3;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .portal-sub {
        font-size: 13px;
        color: #555;
        margin-bottom: 20px;
    }

    .line {
        width: 65%;
        margin: 20px auto;
        border-top: 2px solid #1f3bb3;
    }

    .certificate h1 {
        color: #1f3bb3;
        font-size: 32px;
        margin-bottom: 25px;
    }

    .certificate p {
        font-size: 16px;
        margin: 10px 0;
    }

    .certificate h2 {
        color: #28a745;
        margin: 18px 0;
        font-size: 28px;
    }

    .program {
        font-size: 18px;
        font-weight: 600;
        margin-top: 10px;
    }

    .date {
        margin-top: 40px;
        font-weight: bold;
    }
</style>

<div class="content">
    <div class="certificate-container">

        <div class="certificate">

            <div class="portal-name">SecureIQ</div>
            <div class="portal-sub">Cyber Safety Learning Portal</div>

            <div class="line"></div>

            <h1>CERTIFICATE OF COMPLETION</h1>

            <p>This is to certify that</p>

            <h2>{{ student_name }}</h2>

            <p>has successfully completed the</p>

            <div class="program">Cyber Safety Awareness Program</div>

            <p>And also passed the quiz successfully</p>

            <div class="date">
                Date: {{ today }}
            </div>

        </div>

    </div>
</div>

{% endblock %}
